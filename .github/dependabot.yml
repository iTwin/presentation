version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
    versioning-strategy: "increase"
    allow:
      - update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"
    cooldown:
      default-days: 1
    groups:
      all-dependencies:
        patterns:
          - "*"
