name: Weekly Dependency Update

"on":
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

jobs:
  update-dependencies:
    name: Update dependencies and open PR
    runs-on: ubuntu-latest

    concurrency:
      group: weekly-dependency-update
      cancel-in-progress: true

    permissions:
      contents: write
      pull-requests: write

    env:
      UPDATE_BRANCH: chore/weekly-deps-update
      COMMIT_MESSAGE: "chore: weekly dependency updates"
      PR_TITLE: "chore: weekly dependency updates"
      PR_BODY: |
        Automated weekly dependency updates generated by GitHub Actions.

        This workflow updates dependencies across the workspace and refreshes the lockfile.

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      - name: Use Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.15.0
          cache: "pnpm"

      - name: Update dependencies
        run: |
          pnpm -r update

      - name: Fix dev version ranges
        run: node scripts/fixDevVersionRanges.mjs

      - name: Update lockfile
        run: pnpm install --no-frozen-lockfile

      - name: Create or update dependency PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ env.UPDATE_BRANCH }}
          base: ${{ github.event.repository.default_branch }}
          commit-message: ${{ env.COMMIT_MESSAGE }}
          title: ${{ env.PR_TITLE }}
          body: ${{ env.PR_BODY }}
          draft: always-true
